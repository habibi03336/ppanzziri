name: build-deploy-admin

on:
  workflow_dispatch:
    branches:
      - main
  push:
    paths:
      - "admin/src/**"
      - "admin/public/**"
      - "admin/index.html"
      - "admin/package.json"
      - "admin/package-lock.json"
      - ".github/workflows/build-deploy-admin.yml"
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Make envfile
        uses: SpicyPizza/create-envfile@v1.3
        with:
          envkey_VITE_DASHBOARD_USE_MOCK: false
          envkey_VITE_DASHBOARD_API_BASE_URL: ${{ vars.DASHBOARD_API_BASE_URL }}
          directory: ./admin
          file_name: .env
          fail_on_empty: true

      - name: Build
        working-directory: ./admin
        run: |
          npm ci
          npm run build
        shell: bash

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload to S3
        working-directory: ./admin/dist
        run: |
          aws s3 sync . s3://${{ vars.S3_ADMIN_BUCKET_NAME }}
